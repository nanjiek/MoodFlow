name: moodflow

services:
  mysql:
    image: mysql:8
    container_name: moodflow-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-moodflow}
      MYSQL_USER: ${MYSQL_USER:-moodflow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-moodflow}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-moodflow_root}
      TZ: ${TZ:-Asia/Hong_Kong}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    container_name: moodflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  model-service:
    build:
      context: ./model_service
      dockerfile: Dockerfile
    container_name: moodflow-model-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Hong_Kong}
      PYTHONUNBUFFERED: "1"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-moodflow}
      MYSQL_USER: ${MYSQL_USER:-moodflow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-moodflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_DIR: ${DATA_DIR:-/app/data}
      MODEL_DIR: ${MODEL_DIR:-/app/model_service/artifacts/baseline-clean-v4}
    ports:
      - "${MODEL_SERVICE_PORT:-8010}:8010"
    volumes:
      - ./data:/app/data:ro
      - ./model_service/artifacts:/app/model_service/artifacts

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moodflow-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      model-service:
        condition: service_started
    environment:
      TZ: ${TZ:-Asia/Hong_Kong}
      PYTHONUNBUFFERED: "1"
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-moodflow_backend.settings}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-local-env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-moodflow}
      MYSQL_USER: ${MYSQL_USER:-moodflow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-moodflow}
      DATABASE_URL: mysql://${MYSQL_USER:-moodflow}:${MYSQL_PASSWORD:-moodflow}@mysql:3306/${MYSQL_DATABASE:-moodflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL:-http://model-service:8010}
      DATA_DIR: ${DATA_DIR:-/app/data}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data:ro
      - ./model_service/artifacts:/app/model_service/artifacts

volumes:
  mysql_data:
  redis_data:
